include theme.conf

# Remote control (required for global theme switch via kitty @ load-config)
allow_remote_control yes
listen_on unix:@kitty-${USER}

# Tab bar (style only; colors live in theme-*.conf)
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style   bold
inactive_tab_font_style normal

# Send /effort to focused window (scoped per-pane = per Claude session)
map alt+e send_text all /effort\r

# Theme switcher (global + persisted)
map ctrl+shift+l launch --type=background /home/fr/.dotfiles/kitty/switch-theme.sh light
map ctrl+shift+d launch --type=background /home/fr/.dotfiles/kitty/switch-theme.sh dark
